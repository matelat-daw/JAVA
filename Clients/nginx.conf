worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 256M;

    # Compresión Gzip para mejorar rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    # Cabeceras de seguridad globales
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # NexusAPI Backend (Spring Boot)
    upstream nexus_api {
        server 127.0.0.1:8080;
    }

    server {
        listen       80;
        server_name  localhost;
        root         "D:/Server/Java/Clients";
        index        index.html index.php;

        error_log    "D:/Server/logs/localhost.error.log";
        access_log   "D:/Server/logs/localhost.access.log";

        # 1. API PROXY (Spring Boot) - Prioridad máxima (^~) para evitar conflictos con regex
        location ^~ /api/ {
            proxy_pass http://nexus_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            
            # CORS Headers para la API
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Expose-Headers "Authorization" always;
            
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # 2. PHPMYADMIN
        location ^~ /phpmyadmin/ {
            root "D:/Server";
            index index.php;
            try_files $uri $uri/ =404;
            location ~ \.php$ {
                fastcgi_pass   127.0.0.1:9000;
                include        fastcgi_params;
                fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            }
        }

        # 3. OTROS PROYECTOS (Energy, Project-Energy, etc.) - Agrupados
        location ~ ^/(Energy|Project-Energy|Nueva-BS|Nueva-WEB)/ {
            try_files $uri $uri/ /$1/index.php$is_args$args;
            location ~ \.php$ {
                fastcgi_pass   127.0.0.1:9000;
                include        fastcgi_params;
                fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            }
        }

        # 4. ARCHIVOS ESTÁTICOS (Frontend) - Con caché larga
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|json|html)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        # 5. SPA ROUTING (History API Fallback) - Catch-all al final
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
